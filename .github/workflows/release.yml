name: Release
on:
  push:
    tags:
      - "v*"
  workflow_run:
    workflows: ["Version Bump"]
    types: [completed]
permissions:
  contents: write
jobs:
  build-and-release:
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
      skip: ${{ steps.tag.outputs.skip }}
    strategy:
      matrix: {goos: [linux, darwin, windows], goarch: [amd64, arm64]}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            git fetch --force --tags origin
            git fetch origin main
            TAG=$(git tag --merged origin/main --list 'v*' --sort=-version:refname | head -n1 || true)
          fi
          if [ -z "$TAG" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "value=$TAG" >> "$GITHUB_OUTPUT"
      - name: Setup Go
        if: steps.tag.outputs.skip != 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build binary
        if: steps.tag.outputs.skip != 'true'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          set -euo pipefail
          mkdir -p dist
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          NAME="centinela-${TAG}-${GOOS}-${GOARCH}${EXT}"
          go build -ldflags "-X main.Version=${TAG#v}" -o "dist/$NAME" ./cmd/centinela
      - name: Upload build artifact
        if: steps.tag.outputs.skip != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
  publish:
    if: needs.build-and-release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > SHA256SUMS
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build-and-release.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*
