name: Version Bump

on:
  push:
    branches: [main]

concurrency:
  group: version-bump-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next semver
        id: semver
        shell: bash
        run: |
          set -euo pipefail
          LAST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n1 || true)
          if [ -n "$LAST_TAG" ]; then
            LOG=$(git log --format='%s%n%b' "$LAST_TAG..HEAD" || true)
          else
            LOG=$(git log --format='%s%n%b' HEAD || true)
          fi
          if [ -z "$LOG" ]; then echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0; fi
          BUMP=patch
          if echo "$LOG" | grep -Eq 'BREAKING CHANGE|^[a-z]+(\([^)]+\))?!:'; then BUMP=major
          elif echo "$LOG" | grep -Eq '^feat(\([^)]+\))?:'; then BUMP=minor; fi
          CUR=$(awk -F':= ' '/^VERSION :=/{print $2}' Makefile)
          if [ -z "$CUR" ]; then echo "VERSION missing in Makefile" >&2; exit 1; fi
          IFS='.' read -r MA MI PA <<< "$CUR"
          case "$BUMP" in
            major) MA=$((MA+1)); MI=0; PA=0 ;;
            minor) MI=$((MI+1)); PA=0 ;;
            patch) PA=$((PA+1)) ;;
          esac
          NEXT="$MA.$MI.$PA"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Update Makefile, commit, tag
        if: steps.semver.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          VER="${{ steps.semver.outputs.version }}"
          sed -i "s/^VERSION := .*/VERSION := $VER/" Makefile
          git add Makefile
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "chore(release): bump version to $VER"
          git tag "v$VER"
          git push origin HEAD:main --tags
