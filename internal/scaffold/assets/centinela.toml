# centinela.toml — Project validation configuration
# Run `centinela validate` (or `centinela complete <feature>` at the validate step)
# to execute all checks below.

# ---------------------------------------------------------------------------
# Workflow step validation
# Controls which file suffixes count as "tests" and which paths are "code".
#
# test_suffixes: file extensions for unit/integration tests.
#   Leave empty to accept any file in tests/unit or tests/integration.
#   Examples: [".test.ts"] | ["_test.go"] | ["_spec.rb"] | [".test.js"]
#
# acceptance_suffix: file extension for acceptance step definitions.
#   Leave empty to accept any file in tests/acceptance.
#   Examples: ".steps.ts" | "_steps.rb" | "_steps.py"
#
# code_dirs: path segments that classify a file as "code" (step enforcement).
#   Leave empty to use the built-in defaults:
#   /src/, /app/, /cmd/, /internal/, /pkg/, /lib/, /backend/, /frontend/
#
# step_confirmation_mode: when Centinela should ask before step advancement.
#   "every_step" (default): ask before each `centinela complete`.
#   "after_plan": ask only for plan -> code transition.
#   "auto": no review prompt (agent still runs `centinela complete` explicitly).
#
# plan_advisor_mode: adaptive planning prompts during the `plan` step.
#   "missing_info" (default): ask only missing high-value questions.
#   "always": always ask an advisor round during plan.
#   "off": disable plan-advisor prompts.
#
# plan_question_limit: max advisor questions per prompt round (default cap: 4).
# ---------------------------------------------------------------------------
[workflow]
# test_suffixes      = ["_test.go"]
# acceptance_suffix  = "_steps_test.go"
# code_dirs          = ["/cmd/", "/internal/", "/pkg/"]
# step_confirmation_mode = "every_step"
# plan_advisor_mode  = "missing_info"
# plan_question_limit = 4

# ---------------------------------------------------------------------------
# Validate commands
# Cross-platform commands centinela runs in sequence during the validate step.
# Use the native tool for your stack — no shell scripts required on Windows.
#
# Examples by stack:
#   TypeScript/Node:  "npx tsc --noEmit", "npx vitest run", "npx cucumber-js"
#   Python:           "mypy --strict src", "pytest", "behave"
#   Go:               "go vet ./...", "go test ./..." (includes tests/acceptance)
#   Ruby:             "bundle exec rubocop", "bundle exec rspec", "bundle exec cucumber"
#   Rust:             "cargo check", "cargo test" (+ acceptance runner if separate)
#
# At least one command must execute acceptance tests.
# ---------------------------------------------------------------------------
[validate]
commands = [
  # "npx tsc --noEmit",
  # "npx vitest run",
]

# ---------------------------------------------------------------------------
# Built-in gate configuration
# ---------------------------------------------------------------------------
[gates]
# G1: Block commits when source files exceed 100 lines by default.
file_size = true

# Optional justified G1 exceptions (rare cases only, max_lines must be 101..130)
# [[gates.file_size_exceptions]]
# path = "internal/config/generated_map.go"
# kind = "configuration" # "configuration" or "domain_atomic"
# reason = "Large static map is clearer as one unit"
# max_lines = 130

# G11: Check i18n completeness. Requires [i18n] section below.
i18n = false

# G12: Production readiness (opt-in). Requires subagent report at validate step.
# BLOCKING status blocks centinela complete. WARNING allows but surfaces issues.
# production_readiness = false

# ---------------------------------------------------------------------------
# i18n gate (only used when gates.i18n = true)
#
# format options:
#   "json"     — JSON locale files (next-intl, i18next, vue-i18n, etc.)
#                Expects <dir>/<locale>.json. Checks key parity across locales.
#   "gettext"  — GNU gettext .po files (Godot, Qt, etc.)
#                Expects <dir>/<locale>.po. Fails on msgstr "" entries.
#   "none"     — skip the built-in check (use a custom validate command instead)
# ---------------------------------------------------------------------------
[i18n]
format  = "json"
dir     = "src/i18n/messages"
locales = ["en"]
