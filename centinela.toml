[workflow]
# Enable per-feature git worktrees at .worktrees/<feature>/ on `centinela start`.
use_worktrees = true
# Confirm only at the plan boundary (the highest-leverage review point);
# later steps advance automatically — every gate still verifies mechanically.
step_confirmation_mode = "after_plan"

[validate]
commands = [
  "go test ./...",
  "go test ./tests/acceptance/...",
  "./scripts/check-coverage.sh",
  "./scripts/check-fmt.sh"
]

[gates]
file_size = true

# spec-traceability gate: every in-scope Gherkin scenario must map to an
# acceptance test (// Acceptance: specs/<slug>.feature + // Scenario: <name>).
# Shipped in warn mode so CI surfaces the legacy uncovered-scenario backlog
# without blocking merge; ratchet to fail once the backlog is cleared.
[gates.spec_traceability]
enabled  = true
severity = "warn"

# roadmap-drift gate: ROADMAP.md is generated from .workflow/roadmap.json via
# `centinela roadmap generate`; this gate byte-compares the on-disk file with
# generator output and reports drift. Shipped in warn mode for safe adoption;
# ratchet to fail once ROADMAP.md is regenerated and clean.
[gates.roadmap_drift]
enabled  = true
severity = "warn"

[gates.build]
enabled = true
command = "go build ./cmd/centinela"
targets = [
  { goos = "linux", goarch = "amd64" },
  { goos = "linux", goarch = "arm64" },
  { goos = "darwin", goarch = "amd64" },
  { goos = "darwin", goarch = "arm64" },
  { goos = "windows", goarch = "amd64" },
  { goos = "windows", goarch = "arm64" },
]

# G2 import-graph gate: mechanically enforces the layer-boundary rule from
# PROJECT.md. Conservatively maps only layers that can be encoded soundly
# against the *real* import graph; unmapped packages (ui, roadmap, verify,
# etc.) surface as a non-failing Warn. NOTE: PROJECT.md's G2 prose says
# domain "may import internal/config only", but internal/gates also imports
# internal/gitdiff and internal/workflow also imports internal/orchestration —
# both are pure leaf utilities. The matrix below treats config, gitdiff, and
# orchestration as the leaf layer, which is the honest model. PROJECT.md's G2
# prose should be updated to match.
#
# The gate is language-aware: it auto-selects a graph provider by manifest
# (go.mod -> go, package.json -> node, pyproject/requirements -> python) and
# self-skips with a WARN when none matches. Non-Go projects can set an explicit
# provider, or a custom script for languages without a built-in backend:
#   provider = "node"                       # or "go" | "python" | "script"
#   script_command = ["./scripts/edges.sh"] # must emit the import-graph JSON
# This repo is Go, so the unset provider auto-selects "go" (unchanged behavior).
[gates.import_graph]
enabled = true

# internal/golist is a leaf: a `go list` wrapper importing only stdlib +
# os/exec, shared by the import_graph gate (domain) and codebase analysis
# (domain) so the loader is not forked. internal/importgraph is also a leaf: the
# language-provider seam (go/node/python/script backends) consumed by the gate;
# it imports only stdlib, os/exec, and the internal/golist leaf. internal/gitutil
# is also a leaf: a stdlib + os/exec git/`gh` wrapper (origin-remote / gh
# detection + the delivery-option matrix for `centinela deliver`) consumed by
# cmd/ (and internal/ui read-only for its Option type). See PROJECT.md G2.
[[gates.import_graph.layers]]
name  = "leaf"
paths = ["internal/config/**", "internal/gitdiff/**", "internal/orchestration/**", "internal/githooks/**", "internal/golist/**", "internal/importgraph/**", "internal/gitutil/**"]
allow = []

# internal/analyze is a domain package (deterministic codebase inventory for
# `centinela analyze`) importing only leaves (internal/golist, internal/config);
# it never imports gates/ui/cmd, so it adds no cycle. See PROJECT.md G2.
[[gates.import_graph.layers]]
name  = "domain"
paths = ["internal/workflow/**", "internal/gates/**", "internal/analyze/**"]
allow = ["leaf"]

# aggregator layer: internal/doctor is a domain orchestrator that reads several
# domains (roadmap, evidence, worktree, setup, config, gates, workflow)
# read-only and is itself imported only by cmd/. It is mapped here allowing the
# encoded domain + leaf layers; its edges to still-unmapped packages
# (roadmap/evidence/worktree/setup) surface as the existing non-failing warning,
# consistent with the conservative matrix policy above. internal/insights joins
# this layer: a read-only analytics aggregator over the telemetry log, imported
# only by cmd/. Its sole edge is to internal/telemetry (a config-only leaf,
# unmapped like the other domain reads), so it adds no new failing edge — the
# unmapped-telemetry warning is the existing non-failing kind. See PROJECT.md G2.
# internal/calibration also joins this layer: a read-only per-model calibration
# analyzer over telemetry, importing the telemetry + config leaves only and
# imported solely by cmd/ (its Report type by internal/ui for rendering).
# internal/audit also joins this layer: a read-only baseline/ratchet aggregator
# over gate results (internal/gates, domain) + config (leaf) + an on-disk
# baseline artifact, imported only by cmd/ (its Diff type by internal/ui). Its
# edges (audit→gates domain, audit→config leaf) are both allowed here; gates
# never imports audit, so there is no cycle. See PROJECT.md G2.
# internal/synthesize also joins this layer: a read-only archetype-inference +
# PROJECT.md synthesizer that imports the internal/analyze domain (read-only) and
# stdlib only, imported solely by cmd/ (its Inference type by internal/ui for
# rendering). Its sole edge is synthesize→analyze (domain, allowed); analyze
# never imports synthesize, so there is no cycle. See PROJECT.md G2.
# internal/reconstruct also joins this layer: a read-only spec-corpus
# reconstructor that imports the internal/analyze domain (read-only) and stdlib
# only, imported solely by cmd/ (its Reconstruction type by internal/ui for
# rendering). Its sole edge is reconstruct→analyze (domain, allowed); analyze
# never imports reconstruct, so there is no cycle. See PROJECT.md G2.
# internal/brownmap also joins this layer: a read-only brownfield roadmap
# generator for `centinela roadmap brownfield` that imports internal/analyze
# (domain), internal/roadmap (domain), and internal/reconstruct (aggregator)
# read-only plus stdlib, imported solely by cmd/ (its Plan type by internal/ui
# for rendering). Its analyze/roadmap edges are domain (allowed); its
# brownmap→reconstruct edge is aggregator→aggregator, which is why this layer's
# allow is extended to include "aggregator". analyze/roadmap/reconstruct never
# import brownmap, so there is no cycle. See PROJECT.md G2.
# internal/delivery also joins this layer: a read-only delivery-artifact composer
# for `centinela deliver --via pr` that imports internal/verify (domain) and
# internal/evidence read-only plus stdlib, imported solely by cmd/ (its
# PRBody/ChangelogEntry types by internal/ui if ever rendered). Its
# delivery→verify edge is aggregator→domain (allowed); verify/evidence never
# import delivery, so there is no cycle. See PROJECT.md G2.
[[gates.import_graph.layers]]
name  = "aggregator"
paths = ["internal/doctor/**", "internal/insights/**", "internal/calibration/**", "internal/audit/**", "internal/synthesize/**", "internal/reconstruct/**", "internal/brownmap/**", "internal/delivery/**"]
allow = ["domain", "leaf", "aggregator"]

[[gates.import_graph.layers]]
name  = "cmd"
paths = ["cmd/**"]
allow = ["domain", "leaf", "aggregator"]

# Claim verification re-runs the full `go test ./...` suite to confirm the
# tests-pass claim. The suite (acceptance binary builds + cross-compile) grows
# with each feature and now runs ~220s, so the default 60s timeout is far too
# short. Raise it with margin to keep the verify re-run from flaking on wall-clock.
[verify]
verify_timeout = 360
